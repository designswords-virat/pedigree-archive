<!doctype html>
<html lang="en">
<head>
<script>try{document.documentElement.removeAttribute("data-theme")}catch(e){}</script>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Extended Details — Pedigree Archive</title>
<link rel="stylesheet" href="css/style.css?v=73" />
</head>
<body>

<main class="details-shell">
  <article class="details-card">

    <header class="details-head">
      <div class="details-eyebrow" id="dHeadEyebrow">Extended details</div>
      <h1 id="dHeadName">—</h1>
      <p class="lead">All fields are optional. Fill what you know, leave the rest.</p>
      <a class="back-link" id="dBack" href="dashboard.html">← Back</a>
    </header>

    <form id="dForm" class="details-form">

      <!-- ============ BASIC ============ -->
      <section class="details-pane active" data-pane="basic">
        <p class="details-pane-lead">Name, dates, photo — the spine of the record.</p>
        <div class="details-grid">
          <div class="field-group">
            <label for="bName">Full name <em>required</em></label>
            <input type="text" id="bName" maxlength="100" required />
          </div>
          <div class="field-group">
            <label for="bNick">Nickname</label>
            <input type="text" id="bNick" maxlength="60" />
          </div>

          <div class="field-group full">
            <label>Sex</label>
            <div class="tag-picker" id="bGenderPicker">
              <div class="tag-pick" data-val="male">♂ Man</div>
              <div class="tag-pick" data-val="female">♀ Woman</div>
              <div class="tag-pick" data-val="unknown">✦ Unrecorded</div>
            </div>
          </div>

          <div class="field-group">
            <label for="bBirthDate">Date of birth</label>
            <input type="date" id="bBirthDate" />
          </div>
          <div class="field-group">
            <label for="bBirthPlace">Place of birth</label>
            <input type="text" id="bBirthPlace" maxlength="120" />
          </div>

          <div class="field-group full">
            <label>Status</label>
            <div class="tag-picker" id="bStatusPicker">
              <div class="tag-pick active" data-val="alive">✦ Living</div>
              <div class="tag-pick"        data-val="deceased">† Departed</div>
            </div>
          </div>

          <div class="field-group b-death-only" style="display:none;">
            <label for="bDeathDate">Date of death</label>
            <input type="date" id="bDeathDate" />
          </div>
          <div class="field-group b-death-only" style="display:none;">
            <label for="bDeathPlace">Place of death</label>
            <input type="text" id="bDeathPlace" maxlength="120" />
          </div>

          <div class="field-group full">
            <label>Likeness</label>
            <div class="photo-upload-row">
              <div class="photo-upload-preview" id="bPhotoPreview">
                <span class="ph">No likeness</span>
              </div>
              <div class="photo-upload-controls">
                <input type="file" id="bPhotoFile" accept="image/*" />
                <button type="button" class="btn" id="bPhotoClear" style="margin-top:8px;">Clear</button>
              </div>
            </div>
          </div>

        </div>
      </section>

      <!-- save bar (sticky at the bottom of the form) -->
      <div class="details-actions">
        <button type="button" class="btn"        id="dCancel">Cancel</button>
        <button type="submit" class="btn primary" id="dSave">⏵ Save details</button>
      </div>

      <div class="auth-status" id="dStatus"></div>
    </form>

  </article>
</main>

<div class="toast-stack" id="toasts"></div>


<script src="js/config.js?v=61"></script>
<script src="js/supa.js?v=61"></script>
<script src="js/gate.js?v=61"></script>
<script>Gate.require();</script>
<script src="js/auth.js?v=61"></script>
<script src="js/sounds.js?v=61"></script>
<script src="js/click-sound.js?v=61"></script>
<script src="js/theme.js?v=61"></script>
<script>
(async function () {
  const $  = (s, root = document) => root.querySelector(s);
  const $$ = (s, root = document) => Array.from(root.querySelectorAll(s));

  await Auth.init();
  // No auth gate — single-browser mode. Auth.currentUser() always returns
  // a valid (possibly empty) record.
  const sessionUser = Auth.currentUser();

  // --- determine source ---
  const params = new URLSearchParams(location.search);
  const source = params.get('source') || 'self';   // 'self' | 'person'
  const personId = params.get('id') || null;

  let target = null;        // the object whose .extended we'll edit
  let backHref = 'dashboard.html';
  let headName = '';
  let headEyebrow = 'Extended details';

  if (source === 'person') {
    if (!personId) { location.href = 'tree-edit.html'; return; }
    const person = (sessionUser.people || []).find(p => p.id === personId);
    if (!person) { alert('That person is no longer in your tree.'); location.href = 'tree-edit.html'; return; }
    target = person;
    backHref = 'tree-edit.html';
    headName = person.name || 'Unnamed';
    headEyebrow = 'Details for';
  } else {
    target = sessionUser.profile || {};
    // Back always returns to the dashboard. The dashboard now renders
    // an empty-state "Set up this book" card when no profile exists,
    // instead of bouncing back here, so the old redirect loop is gone.
    backHref = 'dashboard.html';
    headName = (sessionUser.profile && sessionUser.profile.fullName) || 'Your Particulars';
    headEyebrow = (sessionUser.profile && sessionUser.profile.fullName)
                    ? 'Your extended details'
                    : 'Tell us about yourself';
  }

  $('#dHeadName').textContent = headName;
  $('#dHeadEyebrow').textContent = headEyebrow;
  $('#dBack').href = backHref;
  $('#dCancel').addEventListener('click', () => { location.href = backHref; });

  // --- toast ---
  function toast(msg, kind = '') {
    const stack = $('#toasts');
    const el = document.createElement('div');
    el.className = 'toast ' + kind;
    el.textContent = msg;
    stack.appendChild(el);
    setTimeout(() => el.remove(), 2900);
  }

  // ============================================================
  // BASIC TAB — name, sex, dates, photo (the spine record).
  // (Contact / cultural / professional / historical / media / medical
  // tabs were removed — Basic is the only section now.)
  // ============================================================
  let bPhotoData = '';

  function renderBPhoto() {
    const p = $('#bPhotoPreview');
    if (bPhotoData) {
      p.innerHTML = '';
      const img = document.createElement('img');
      img.src = bPhotoData;
      p.appendChild(img);
    } else {
      p.innerHTML = '<span class="ph">No likeness</span>';
    }
  }

  // pickers
  $$('#bGenderPicker .tag-pick').forEach(t => t.addEventListener('click', () => {
    $$('#bGenderPicker .tag-pick').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
  }));
  $$('#bStatusPicker .tag-pick').forEach(t => t.addEventListener('click', () => {
    $$('#bStatusPicker .tag-pick').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    const dec = t.dataset.val === 'deceased';
    document.querySelectorAll('.b-death-only').forEach(el => el.style.display = dec ? '' : 'none');
  }));
  $('#bPhotoFile').addEventListener('change', async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    if (f.size > 8 * 1024 * 1024) { toast('Image too large (max 8 MB).', 'error'); e.target.value = ''; return; }
    try {
      toast('Uploading photo…', '');
      bPhotoData = await Photos.upload(f);
      renderBPhoto();
    } catch (err) {
      toast('Upload failed: ' + err.message, 'error');
      e.target.value = '';
    }
  });
  $('#bPhotoClear').addEventListener('click', () => {
    if (bPhotoData) Photos.deleteByUrl(bPhotoData);
    bPhotoData = '';
    $('#bPhotoFile').value = '';
    renderBPhoto();
  });

  function prefillBasic() {
    const p = (source === 'self') ? (sessionUser.profile || {}) : target;
    $('#bName').value       = (source === 'self' ? p.fullName : p.name) || '';
    $('#bNick').value       = p.nickname    || '';
    $('#bBirthDate').value  = p.birthDate   || '';
    $('#bBirthPlace').value = p.birthPlace  || '';
    $('#bDeathDate').value  = p.deathDate   || '';
    $('#bDeathPlace').value = p.deathPlace  || '';
    const gender = p.gender || 'unknown';
    $$('#bGenderPicker .tag-pick').forEach(t => t.classList.toggle('active', t.dataset.val === gender));
    const status = (source === 'self' ? p.status === 'deceased' : !!p.deceased) ? 'deceased' : 'alive';
    $$('#bStatusPicker .tag-pick').forEach(t => t.classList.toggle('active', t.dataset.val === status));
    document.querySelectorAll('.b-death-only').forEach(el => el.style.display = status === 'deceased' ? '' : 'none');
    bPhotoData = p.photo || '';
    renderBPhoto();
  }

  function gatherBasic() {
    const status = ($('#bStatusPicker .tag-pick.active') || {dataset:{val:'alive'}}).dataset.val;
    const gender = ($('#bGenderPicker .tag-pick.active') || {dataset:{val:'unknown'}}).dataset.val;
    const yearOf = (d) => d ? parseInt(String(d).slice(0,4), 10) : null;
    const common = {
      nickname:   $('#bNick').value.trim(),
      gender:     gender,
      birthDate:  $('#bBirthDate').value || null,
      birthPlace: $('#bBirthPlace').value.trim(),
      photo:      bPhotoData,
    };
    if (status === 'deceased') {
      common.deathDate  = $('#bDeathDate').value || null;
      common.deathPlace = $('#bDeathPlace').value.trim();
    } else {
      common.deathDate = null;
      common.deathPlace = '';
    }
    if (source === 'self') {
      return { ...common, fullName: $('#bName').value.trim(), status: status };
    } else {
      return {
        ...common,
        name: $('#bName').value.trim(),
        deceased: status === 'deceased',
        birthYear: yearOf(common.birthDate),
        deathYear: yearOf(common.deathDate),
      };
    }
  }

  function setStatus(msg, kind) {
    const el = $('#dStatus');
    el.textContent = msg;
    el.className = 'auth-status ' + (kind || '');
  }

  $('#dForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const basic = gatherBasic();
    if (!basic.fullName && !basic.name) {
      setStatus('Name cannot be empty.', 'error');
      return;
    }
    try {
      if (source === 'person') {
        const u = Auth.currentUser();
        const tree = (u.people || []).slice();
        const idx = tree.findIndex(p => p.id === personId);
        if (idx === -1) throw new Error('Person no longer exists.');
        tree[idx] = { ...tree[idx], ...basic };
        await Auth.saveTree(tree);
      } else {
        const cur = (sessionUser.profile || {});
        await Auth.saveProfile({ ...cur, ...basic });
      }
      toast('Details saved', 'success');
      setStatus('Saved.', 'success');
      setTimeout(() => { location.href = backHref; }, 700);
    } catch (err) {
      const msg = err.message || 'Could not save.';
      setStatus(msg, 'error');
      toast(msg, 'error');
    }
  });

  prefillBasic();
})();
</script>
</body>
</html>
