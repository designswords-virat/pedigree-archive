<!doctype html>
<html lang="en">
<head>
<script>try{document.documentElement.removeAttribute("data-theme")}catch(e){}</script>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pedigree Archive — A book of kindred</title>
<meta name="description" content="Build your family tree as a hand-painted manuscript. Oval portraits, gold lineage lines, an heirloom for your house." />
<link rel="stylesheet" href="css/style.css?v=66" />
</head>
<body>

<div class="landing">

  <!-- decorative tree (background) -->
  <div class="landing-canvas">
    <svg id="pedigreeSvg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
  </div>

  <!-- vignette -->
  <div class="landing-vignette"></div>

  <!-- corner brand -->
  <div class="landing-brand">
    <img class="brand-mark" src="logo/logo1.png" alt="Ancestry — Stories Retold" />
  </div>

  <!-- corner admin link — hidden in coming-soon mode. Re-enable once
       Supabase is wired back up in js/config.js. -->
  <!-- <a class="steward-corner" href="superadmin.html" title="Site admin">⚙ Admin</a> -->

  <!-- hero copy — bottom half, three columns: heading | subheading | paragraph + CTA -->
  <section class="hero">
    <div class="hero-cols">
      <div class="hero-col hero-col-heading">
        <h1 class="hero-title">A book of Kindred &amp; Lineage</h1>
      </div>
      <div class="hero-col hero-col-sub">
        <div class="hero-eyebrow">Your family, in the old style</div>
      </div>
      <div class="hero-col hero-col-para">
        <p class="hero-tagline">
          Inscribe your ancestors in oval portraits, joined by the
          threads of generation. An heirloom for your house — built
          in a quiet hour.
        </p>
        <div class="hero-actions">
          <a class="hero-cta" href="tree-edit.html" id="ctaMain">Develop Your Family Tree</a>
          <a class="hero-sub-link" href="dashboard.html" id="ctaSub" style="display:none;">— or open your existing book</a>
        </div>
      </div>
    </div>
  </section>

  <!-- floating caption (positioned by main.js to follow the spotlight) -->
  <div class="spotlight-caption" id="spotlightCaption" aria-hidden="true">
    <div class="caption-name" id="captionName"></div>
    <div class="caption-meta" id="captionMeta"></div>
  </div>

</div>

<script src="js/config.js?v=39"></script>
<script src="js/supa.js?v=39"></script>
<script src="js/auth.js?v=39"></script>
<script src="js/sounds.js?v=39"></script>
<script src="js/pedigree.js?v=63"></script>
<script src="js/hero-demo.js?v=63"></script>
<script src="js/main.js?v=63"></script>
<script src="js/gate.js?v=39"></script>
<script src="js/demo.js?v=39"></script>
<script>
// Smart CTA — login flow is currently disabled, so the only branch
// is: do you already have a tree?
//   - has tree -> "Open Your Book" -> dashboard.html
//   - no tree  -> default "Develop Your Family Tree" -> tree-edit.html
(function () {
  try {
    const cta = document.getElementById('ctaMain');
    const sub = document.getElementById('ctaSub');
    if (!cta) return;
    const raw = localStorage.getItem('pa_local_v1');
    const data = raw ? JSON.parse(raw) : null;
    if (data && Array.isArray(data.people) && data.people.length > 0) {
      cta.textContent = 'Open Your Book';
      cta.href = 'dashboard.html';
      if (sub) {
        sub.textContent = '— or start a fresh one';
        sub.href = 'tree-edit.html';
        sub.style.display = '';
      }
    }
  } catch (e) { /* keep default CTA */ }
})();
</script>
</body>
</html>
