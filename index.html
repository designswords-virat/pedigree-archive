<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pedigree Archive — A book of kindred</title>
<meta name="description" content="Build your family tree as a hand-painted manuscript. Oval portraits, gold lineage lines, an heirloom for your house." />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="landing">

  <!-- decorative tree (background) -->
  <div class="landing-canvas">
    <svg id="pedigreeSvg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
  </div>

  <!-- vignette -->
  <div class="landing-vignette"></div>

  <!-- corner brand -->
  <div class="landing-brand">
    <div class="brand-logo"><span>✦</span></div>
    <div class="brand-text">
      <div class="title">Pedigree Archive</div>
      <div class="subtitle">a book of kindred</div>
    </div>
  </div>

  <!-- corner admin link — hidden in coming-soon mode. Re-enable once
       Supabase is wired back up in js/config.js. -->
  <!-- <a class="steward-corner" href="superadmin.html" title="Site admin">⚙ Admin</a> -->

  <!-- hero copy -->
  <section class="hero">
    <div class="hero-flourish">✦ &nbsp; ✦ &nbsp; ✦</div>
    <div class="hero-eyebrow">Your family, in the old style</div>
    <h1 class="hero-title">
      <span class="ornate">A book of</span>
      Kindred &amp; Lineage
    </h1>
    <p class="hero-tagline">
      Inscribe your ancestors in oval portraits framed in gold,
      joined by the threads of generation. An heirloom for your house —
      built in a quiet hour.
    </p>
    <a class="hero-cta" href="mailto:designs.words@gmail.com?subject=Pedigree%20Archive%20%E2%80%94%20notify%20me&body=I%27d%20like%20to%20know%20when%20Pedigree%20Archive%20opens.%20Here%27s%20my%20email%3A">Notify Me When It Opens</a>
    <span class="hero-sub-link" style="cursor:default;">— launching soon</span>
  </section>

  <!-- floating caption (positioned by main.js to follow the spotlight) -->
  <div class="spotlight-caption" id="spotlightCaption" aria-hidden="true">
    <div class="caption-name" id="captionName"></div>
    <div class="caption-meta" id="captionMeta"></div>
  </div>

</div>

<script src="js/data.js"></script>
<script src="js/sounds.js"></script>
<script src="js/pedigree.js"></script>
<script src="js/main.js"></script>
</body>
</html>
