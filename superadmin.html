<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin — Pedigree Archive</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ACCESS-DENIED OVERLAY (shown if user isn't logged in or isn't admin) -->
<div class="login-screen" id="adminGate">
  <div class="login-box">
    <h1 id="gateTitle">Checking access…</h1>
    <div class="sub" id="gateSub">One moment…</div>
    <div id="gateActions" style="display:none;margin-top:18px;">
      <a class="btn primary" href="signup.html?mode=login" style="display:block;text-align:center;">⏵ Sign in</a>
      <a class="back-link" href="index.html" style="margin-top:12px;">← Return to the archive</a>
    </div>
  </div>
</div>

<!-- ADMIN SHELL -->
<div class="admin-shell" id="adminShell" style="display:none;">

  <header class="topbar">
    <div class="brand">
      <div class="brand-logo"><span>★</span></div>
      <div class="brand-text">
        <div class="title">Site Admin</div>
        <div class="subtitle">Every registered user, across every device</div>
      </div>
    </div>
    <div class="hud-stats">
      <div class="stat"><span class="lbl">Books</span><span class="val" id="userCount">0</span></div>
    </div>
    <div class="toolbar">
      <a class="btn" href="dashboard.html">⌂ My Dashboard</a>
      <button class="btn danger" id="btnAdminLogout">⏻ Sign out</button>
    </div>
  </header>

  <main class="admin-content">
    <aside class="admin-list">
      <h3>
        <span>Registered users</span>
      </h3>
      <input type="text" id="searchBox" placeholder="Seek by email or name…" style="width:100%;margin-bottom:12px;" />
      <div id="userList"></div>
    </aside>

    <section class="admin-form" id="detailArea">
      <div class="empty-state" id="emptyState">
        Choose a user to view their book
      </div>
      <div id="userDetail" style="display:none;"></div>
    </section>
  </main>
</div>

<div class="toast-stack" id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supa.js"></script>
<script src="js/auth.js"></script>
<script>
(async function () {
  const $  = (s) => document.querySelector(s);
  const $$ = (s) => Array.from(document.querySelectorAll(s));

  function toast(msg, kind = '') {
    const stack = $('#toasts');
    const el = document.createElement('div');
    el.className = 'toast ' + kind;
    el.textContent = msg;
    stack.appendChild(el);
    setTimeout(() => el.remove(), 2900);
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  function showShell() {
    $('#adminGate').style.display = 'none';
    $('#adminShell').style.display = '';
  }
  function showGate(title, sub, allowSignIn) {
    $('#gateTitle').textContent = title;
    $('#gateSub').textContent   = sub;
    $('#gateActions').style.display = allowSignIn ? '' : 'none';
    $('#adminGate').style.display = '';
    $('#adminShell').style.display = 'none';
  }

  await Auth.init();

  if (!Auth.isLoggedIn()) {
    showGate('Sign in required',
             'You need to sign in with an admin account to view this page.',
             true);
    return;
  }
  if (!Auth.isAdmin()) {
    showGate('Not an admin account',
             'You\'re signed in, but this account doesn\'t have admin access. Ask the site owner to set is_admin = true on your profile row.',
             false);
    return;
  }

  showShell();

  $('#btnAdminLogout').addEventListener('click', async () => {
    await Auth.logout();
    location.href = 'index.html';
  });

  let selectedId = null;
  let allUsersCache = [];

  async function renderList() {
    try {
      allUsersCache = await Auth.listAllUsers();
    } catch (err) {
      toast('Failed to load users: ' + err.message, 'error');
      return;
    }
    const filter = ($('#searchBox').value || '').trim().toLowerCase();
    const filtered = filter
      ? allUsersCache.filter(u =>
          (u.email || '').toLowerCase().includes(filter)
          || ((u.profile && u.profile.fullName) || '').toLowerCase().includes(filter))
      : allUsersCache;
    $('#userCount').textContent = String(allUsersCache.length).padStart(2, '0');
    const list = $('#userList');
    list.innerHTML = '';
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state" style="padding:20px;font-size:14px;">No registered users yet.</div>';
      return;
    }
    filtered.forEach(u => {
      const card = document.createElement('div');
      card.className = 'person-card' + (u.user_id === selectedId ? ' selected' : '');
      const photoUrl = u.profile && u.profile.photo;
      const thumb = photoUrl
        ? '<img class="card-thumb" src="' + escapeHtml(photoUrl) + '" alt="" onerror="this.style.opacity=0.2;" />'
        : '<div class="card-thumb placeholder"></div>';
      const name = (u.profile && u.profile.fullName) || '— no profile —';
      const treeSize = (u.people && u.people.length) || 0;
      const meta = u.profile && u.profile.gender
        ? (u.profile.gender + ' · ' + treeSize + ' in tree')
        : 'profile not yet filled';
      const adminBadge = u.is_admin ? ' · <em style="color:var(--rose);font-style:normal;">admin</em>' : '';
      card.innerHTML =
        thumb +
        '<div class="card-text">' +
        '<div class="pname">' + escapeHtml(name) + '</div>' +
        '<div class="pmeta">' + escapeHtml(u.email) + ' · ' + escapeHtml(meta) + adminBadge + '</div>' +
        '</div>';
      card.addEventListener('click', () => selectUser(u.user_id));
      list.appendChild(card);
    });
  }
  $('#searchBox').addEventListener('input', renderList);

  function selectUser(id) {
    selectedId = id;
    renderList();
    const u = allUsersCache.find(x => x.user_id === id);
    if (!u) return;
    $('#emptyState').style.display = 'none';
    const det = $('#userDetail');
    det.style.display = '';
    const p = u.profile || {};
    const photoUrl = p.photo || '';
    det.innerHTML = `
      <div class="ud-head">
        <div class="ud-portrait">
          ${photoUrl ? '<img src="' + escapeHtml(photoUrl) + '" alt="" />' : '<span class="ph">No likeness</span>'}
        </div>
        <div class="ud-meta">
          <h2>${escapeHtml(p.fullName || '— no profile —')}</h2>
          <div class="ud-line"><span>Email</span><strong>${escapeHtml(u.email)}</strong></div>
          <div class="ud-line"><span>User id</span><strong>${escapeHtml(u.user_id)}</strong></div>
          <div class="ud-line"><span>Joined</span><strong>${u.created_at ? new Date(u.created_at).toLocaleString() : '—'}</strong></div>
          <div class="ud-line"><span>Admin</span><strong>${u.is_admin ? 'Yes' : 'No'}</strong></div>
        </div>
      </div>

      <h3 style="margin-top:24px;">Particulars</h3>
      <div class="ud-grid">
        <div><span>Nickname</span><strong>${escapeHtml(p.nickname || '—')}</strong></div>
        <div><span>Sex</span><strong>${escapeHtml(p.gender || '—')}</strong></div>
        <div><span>Born</span><strong>${escapeHtml(p.birthDate || '—')}</strong></div>
        <div><span>Birthplace</span><strong>${escapeHtml(p.birthPlace || '—')}</strong></div>
        <div><span>Status</span><strong>${p.status === 'deceased' ? 'Departed' : 'Living'}</strong></div>
        ${p.status === 'deceased' ? `
          <div><span>Departed</span><strong>${escapeHtml(p.deathDate || '—')}</strong></div>
          <div><span>Place of death</span><strong>${escapeHtml(p.deathPlace || '—')}</strong></div>
        ` : ''}
      </div>

      <h3 style="margin-top:24px;">Family tree</h3>
      <div class="ud-tree">
        ${(u.people && u.people.length)
          ? '<div class="ud-tree-count">' + u.people.length + ' ' + (u.people.length === 1 ? 'soul' : 'souls') + ' recorded</div>' +
            '<ul class="ud-tree-list">' +
            u.people.map(per =>
              '<li><strong>' + escapeHtml(per.name) + '</strong>' +
              (per.gender ? ' <em>(' + escapeHtml(per.gender) + ')</em>' : '') +
              (per.deceased ? ' †' : '') + '</li>'
            ).join('') +
            '</ul>'
          : '<div class="ud-tree-empty">— No tree built yet —</div>'
        }
      </div>

      <div class="form-actions" style="margin-top:28px;">
        <button class="btn danger" id="btnDeleteUser">⚠ Delete this user's profile</button>
      </div>
    `;
    $('#btnDeleteUser').addEventListener('click', async () => {
      if (!confirm('Delete this user\'s profile row? Their auth account itself remains until you delete it from the Supabase dashboard.')) return;
      try {
        await Auth.deleteUser(u.user_id);
        toast('Profile deleted', 'error');
        selectedId = null;
        $('#emptyState').style.display = '';
        $('#userDetail').style.display = 'none';
        await renderList();
      } catch (err) {
        toast('Delete failed: ' + err.message, 'error');
      }
    });
  }

  await renderList();
})();
</script>
</body>
</html>
